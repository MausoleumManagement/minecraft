apiVersion: v1
kind: Pod
metadata:
  name: minecraft-restore
  namespace: minecraft
spec:
  restartPolicy: Never
  containers:
    - name: debug
      image: itzg/mc-backup:latest
      command: ["sleep", "infinity"]
      env:
        - name: RESTIC_REPOSITORY
          value: "s3:http://garage.irminsul:3900/minecraft-backups/restic"
        - name: RESTIC_HOSTNAME
          value: "bobserver"
        - name: RESTIC_CACHE_DIR
          value: /backups
        - name: RESTIC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minecraft-restic
              key: restic-password
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minecraft-restic
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minecraft-restic
              key: aws-secret-access-key
      volumeMounts:
        - name: data
          mountPath: /data
        - name: backup
          mountPath: /backups
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: minecraft-datadir
    - name: backup
      persistentVolumeClaim:
        claimName: minecraft-backupdir
